name: Validate Bahrain Brick Assets
on:
  push:
  pull_request:

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m unittest discover -s tests -v
      - run: python tools/validate_manifests.py
      - run: python -m py_compile tools/*.py tools/blender/*.py tests/*.py
      - run: |
          if grep -RInE '\.(keystore|jks|p12|pfx)$|keystore/(debug|release)_password' . --exclude-dir=.git; then
            echo 'Signing material or password reference detected'; exit 1
          fi
