name: Validate Bahrain Brick Assets
on:
  push:
  pull_request:

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python tools/source_integrity.py verify --root . --ledger SHA256SUMS
      - run: python -m unittest discover -s tests -v
      - run: python tools/validate_manifests.py
      - run: python -m py_compile tools/*.py tools/blender/*.py tests/*.py
      - run: python tools/check_signing_material.py .
