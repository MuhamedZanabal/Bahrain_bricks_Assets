name: Import verified Bahrain Brick history

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  import:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Download and verify exact Git bundle
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 8 --retry-all-errors \
            'https://bahrain-brick-assets-20260713.serveo.net/bahrain-brick-assets-phase4-batch2.bundle' \
            --output /tmp/bahrain-brick-assets.bundle
          echo '1bbadc043c6849cbd8a8a6716db9f4b454d064319c1388dd8b4e6caef2f3d6f9  /tmp/bahrain-brick-assets.bundle' | sha256sum -c -
          git bundle verify /tmp/bahrain-brick-assets.bundle
      - name: Import exact repository history
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git clone /tmp/bahrain-brick-assets.bundle /tmp/imported
          cd /tmp/imported
          test "$(git rev-parse work/bahrain-brick-complete-asset-system-v1)" = 'e5107a51edb4add0b9bc84aa5818135d03a7f7f4'
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin \
            refs/heads/work/bahrain-brick-complete-asset-system-v1:refs/heads/main
