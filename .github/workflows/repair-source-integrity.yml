name: Repair deterministic source-integrity ledger

on:
  push:
    branches: [work/source-integrity-ledger-v1]
    paths:
      - tests/test_source_integrity.py
      - .github/workflows/repair-source-integrity.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: work/source-integrity-ledger-v1
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Regenerate canonical tracked-file ledger
        run: python tools/source_integrity.py generate --root . --ledger SHA256SUMS
      - name: Verify corrected repository
        shell: bash
        run: |
          set -euo pipefail
          python tools/source_integrity.py verify --root . --ledger SHA256SUMS
          sha256sum -c SHA256SUMS
          python -m unittest discover -s tests -v 2>&1 | tee /tmp/tests.log
          grep -q 'Ran 20 tests' /tmp/tests.log
          python tools/validate_manifests.py
          python tools/check_signing_material.py .
          python -m py_compile tools/*.py tools/blender/*.py tests/*.py
      - name: Commit regenerated ledger
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add SHA256SUMS
          git diff --cached --quiet && exit 0
          git commit -m 'chore(integrity): regenerate canonical checksum ledger'
          git push origin HEAD:work/source-integrity-ledger-v1
