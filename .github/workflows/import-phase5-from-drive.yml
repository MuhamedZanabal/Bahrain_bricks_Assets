name: Import verified Phase 5 history from Drive

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download and verify exact Git bundle
        shell: bash
        run: |
          set -euo pipefail
          bundle='bahrain-brick-assets-phase5-asset-lab.bundle'
          file_id='1SykBMg8fteOtnwsj-AlwNrLKZHOHZlhM'
          curl --fail --location --retry 8 --retry-all-errors \
            "https://drive.usercontent.google.com/download?id=${file_id}&export=download&confirm=t" \
            --output "$bundle"
          echo '98e3964a1c84200c8d764116bc027678de0019fc6481ca41825ed606aa2a9c41  bahrain-brick-assets-phase5-asset-lab.bundle' | sha256sum -c -
          git init verify
          git -C verify bundle verify "${GITHUB_WORKSPACE}/${bundle}"

      - name: Publish exact main and production branch
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          expected='84ac94399262f71f29bf65dd553cd7729d87cce0'
          branch='work/bahrain-brick-complete-asset-system-v1'
          git clone --mirror bahrain-brick-assets-phase5-asset-lab.bundle imported.git
          actual="$(git --git-dir=imported.git rev-parse "refs/heads/${branch}")"
          test "$actual" = "$expected"
          git --git-dir=imported.git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git --git-dir=imported.git push --force origin "refs/heads/${branch}:refs/heads/main"
          git --git-dir=imported.git push --force origin "refs/heads/${branch}:refs/heads/${branch}"
